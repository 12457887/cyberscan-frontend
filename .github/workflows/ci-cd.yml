name: CI/CD CyberScan Frontend

on:
  push:
    branches: [ main ]

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --force

      - name: Build Next.js
        env:
          NEXT_PUBLIC_BACKEND_URL: http://192.168.100.55:30800
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BACKEND_API_KEY: ${{ secrets.NEXT_PUBLIC_BACKEND_API_KEY }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ahmedaminehamden/cyberscan-frontend:latest

      - name: Deploy to k3s
        run: |
          export KUBECONFIG=/home/bi/.kube/config
          kubectl get nodes
          kubectl rollout restart deployment frontend-pod -n cyberscan
          kubectl rollout status deployment frontend-pod -n cyberscan
